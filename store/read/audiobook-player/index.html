<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Audiobook Player — FreeBookStore</title>
<meta name="description" content="Text-to-speech audiobook player. Paste text or upload files. Voice selector, speed control, sleep timer.">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#faf9f7;--panel:#fff;--ink:#1c1917;--muted:#78716c;--accent:#b45309;--line:#e7e5e4}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}

.top-bar{display:flex;align-items:center;gap:.75rem;padding:.6rem 1.2rem;border-bottom:1px solid var(--line);background:var(--panel)}
.back{font-size:.82rem;font-weight:600;color:var(--muted);text-decoration:none}
.back:hover{color:var(--ink);text-decoration:none}
.top-bar h1{font-family:'Lora',serif;font-size:1.1rem;font-weight:700}

.container{max-width:800px;margin:0 auto;padding:1.5rem}

.input-section{margin-bottom:1.5rem}
.input-section h2{font-family:'Lora',serif;font-size:1rem;margin-bottom:.5rem}
textarea{width:100%;height:200px;border:1px solid var(--line);border-radius:8px;padding:.75rem;font-family:inherit;font-size:.88rem;resize:vertical;background:var(--panel);outline:none;line-height:1.6}
textarea:focus{border-color:var(--accent)}
.file-row{display:flex;gap:.5rem;margin-top:.5rem;align-items:center}
.file-btn{padding:.4rem .8rem;border:1px solid var(--line);border-radius:6px;background:var(--panel);cursor:pointer;font-size:.78rem;font-family:inherit;color:var(--muted);font-weight:600}
.file-btn:hover{border-color:var(--accent);color:var(--accent)}
.file-btn input{display:none}

.controls{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:1.2rem;margin-bottom:1rem}
.controls-row{display:flex;gap:.75rem;flex-wrap:wrap;align-items:center;margin-bottom:.75rem}
.controls-row:last-child{margin-bottom:0}
.ctrl-group{display:flex;flex-direction:column;gap:.2rem;min-width:120px}
.ctrl-group label{font-size:.7rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.ctrl-group select,.ctrl-group input[type=range]{width:100%;font-family:inherit;font-size:.78rem;border:1px solid var(--line);border-radius:4px;padding:.25rem .4rem;background:var(--panel)}
.ctrl-group .val{font-size:.72rem;color:var(--accent);font-weight:600;text-align:right}

.play-controls{display:flex;gap:.5rem;align-items:center;justify-content:center;margin:1rem 0}
.play-btn{width:48px;height:48px;border-radius:50%;border:none;background:var(--accent);color:#fff;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
.play-btn:hover{background:#92400e}
.play-btn:disabled{opacity:.4;cursor:default}
.small-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--line);background:var(--panel);cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.small-btn:hover{border-color:var(--accent);color:var(--accent)}

.progress{margin:1rem 0}
.progress-bar{width:100%;height:6px;background:var(--line);border-radius:3px;overflow:hidden;cursor:pointer}
.progress-fill{height:100%;background:var(--accent);transition:width .1s;width:0}
.progress-info{display:flex;justify-content:space-between;font-size:.72rem;color:var(--muted);margin-top:.3rem}

.text-display{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:1.2rem;min-height:200px;line-height:1.8;font-size:.95rem}
.text-display .sentence{transition:background .1s}
.text-display .sentence.active{background:rgba(180,83,9,.12);border-radius:4px;padding:0 2px}

.sections-nav{display:flex;gap:.3rem;flex-wrap:wrap;margin-bottom:.75rem}
.sec-btn{padding:.25rem .6rem;border:1px solid var(--line);border-radius:4px;background:var(--panel);cursor:pointer;font-size:.7rem;font-family:inherit;color:var(--muted);font-weight:500}
.sec-btn:hover{border-color:var(--accent);color:var(--accent)}
.sec-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

.sleep-timer{display:flex;gap:.3rem;align-items:center;margin-left:auto}
.sleep-btn{padding:.2rem .5rem;border:1px solid var(--line);border-radius:4px;background:var(--panel);cursor:pointer;font-size:.68rem;font-family:inherit;color:var(--muted)}
.sleep-btn:hover{border-color:var(--accent)}
.sleep-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.sleep-label{font-size:.7rem;color:var(--muted);font-weight:600}
#sleepCountdown{font-size:.72rem;color:var(--accent);font-weight:600;min-width:40px}

.bookmark-info{font-size:.72rem;color:var(--muted);margin-top:.5rem}
.bookmark-info button{background:none;border:none;color:var(--accent);cursor:pointer;font-size:.72rem;font-weight:600;font-family:inherit;text-decoration:underline}

footer{text-align:center;padding:1.5rem;font-size:.7rem;color:var(--muted)}
</style>
</head>
<body>
<div class="top-bar">
<a href="/" class="back">< FreeBookStore</a>
<h1>Audiobook Player</h1>
</div>

<div class="container">
<div class="input-section">
<h2>Add Text</h2>
<textarea id="textInput" placeholder="Paste your text here, or upload a .txt file..."></textarea>
<div class="file-row">
<label class="file-btn">Upload .txt<input type="file" id="fileUpload" accept=".txt"></label>
<span id="charCount" style="font-size:.72rem;color:var(--muted)"></span>
</div>
</div>

<div class="controls">
<div class="controls-row">
<div class="ctrl-group" style="flex:1">
<label>Voice</label>
<select id="voiceSelect"></select>
</div>
<div class="ctrl-group">
<label>Speed <span class="val" id="speedVal">1.0x</span></label>
<input type="range" id="speed" min="0.5" max="3" step="0.1" value="1">
</div>
<div class="ctrl-group">
<label>Pitch <span class="val" id="pitchVal">1.0</span></label>
<input type="range" id="pitch" min="0.5" max="2" step="0.1" value="1">
</div>
</div>
<div class="controls-row">
<div class="sleep-timer">
<span class="sleep-label">Sleep:</span>
<button class="sleep-btn" data-min="15">15m</button>
<button class="sleep-btn" data-min="30">30m</button>
<button class="sleep-btn" data-min="45">45m</button>
<button class="sleep-btn" data-min="60">60m</button>
<span id="sleepCountdown"></span>
</div>
</div>
</div>

<div class="play-controls">
<button class="small-btn" id="prevSection" title="Previous section">&#9664;&#9664;</button>
<button class="small-btn" id="stopBtn" title="Stop">&#9632;</button>
<button class="play-btn" id="playBtn" title="Play">&#9654;</button>
<button class="small-btn" id="nextSection" title="Next section">&#9654;&#9654;</button>
<button class="small-btn" id="bookmarkBtn" title="Bookmark position">&#128278;</button>
</div>

<div class="progress">
<div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
<div class="progress-info"><span id="currentSentence">0 / 0</span><span id="timeEst"></span></div>
</div>

<div class="sections-nav" id="sectionsNav"></div>

<div class="text-display" id="textDisplay">
<p style="color:var(--muted);text-align:center;padding:2rem">Text will appear here after you add content above.</p>
</div>

<div class="bookmark-info" id="bookmarkInfo"></div>
</div>

<footer>FreeBookStore</footer>
<script src="/related.js"></script>
<script>
(function(){
var synth=window.speechSynthesis;
var voices=[];
var sentences=[];
var sections=[];
var currentIdx=0;
var currentSection=0;
var isPlaying=false;
var sleepTimer=null;
var sleepEnd=null;

var voiceSelect=document.getElementById('voiceSelect');
var speedSlider=document.getElementById('speed');
var pitchSlider=document.getElementById('pitch');
var playBtn=document.getElementById('playBtn');
var stopBtn=document.getElementById('stopBtn');
var textInput=document.getElementById('textInput');
var textDisplay=document.getElementById('textDisplay');
var progressFill=document.getElementById('progressFill');
var currentSentenceEl=document.getElementById('currentSentence');
var timeEstEl=document.getElementById('timeEst');
var sectionsNav=document.getElementById('sectionsNav');

function loadVoices(){
  voices=synth.getVoices();
  voiceSelect.innerHTML='';
  voices.forEach(function(v,i){
    var opt=document.createElement('option');
    opt.value=i;opt.textContent=v.name+' ('+v.lang+')';
    if(v.default) opt.selected=true;
    voiceSelect.appendChild(opt);
  });
}
loadVoices();
synth.addEventListener('voiceschanged',loadVoices);

speedSlider.addEventListener('input',function(){document.getElementById('speedVal').textContent=this.value+'x'});
pitchSlider.addEventListener('input',function(){document.getElementById('pitchVal').textContent=this.value});

document.getElementById('fileUpload').addEventListener('change',function(){
  var f=this.files[0];if(!f) return;
  var reader=new FileReader();
  reader.onload=function(e){textInput.value=e.target.result;parseText()};
  reader.readAsText(f);
});

textInput.addEventListener('input',function(){
  document.getElementById('charCount').textContent=this.value.length+' chars';
});

function parseText(){
  var text=textInput.value.trim();
  if(!text) return;
  sections=text.split(/\n\s*\n/).filter(function(s){return s.trim()});
  sentences=[];
  sections.forEach(function(sec,si){
    var sents=sec.match(/[^.!?]+[.!?]+/g)||[sec];
    sents.forEach(function(s){sentences.push({text:s.trim(),section:si})});
  });
  renderSections();
  renderText();
  document.getElementById('charCount').textContent=text.length+' chars, '+sentences.length+' sentences';
  checkBookmark();
}

function renderSections(){
  sectionsNav.innerHTML='';
  sections.forEach(function(s,i){
    var btn=document.createElement('button');
    btn.className='sec-btn'+(i===currentSection?' active':'');
    btn.textContent='Section '+(i+1);
    btn.addEventListener('click',function(){jumpToSection(i)});
    sectionsNav.appendChild(btn);
  });
}

function renderText(){
  textDisplay.innerHTML='';
  sentences.forEach(function(s,i){
    var span=document.createElement('span');
    span.className='sentence'+(i===currentIdx?' active':'');
    span.textContent=s.text+' ';
    span.dataset.idx=i;
    textDisplay.appendChild(span);
  });
}

function highlightCurrent(){
  document.querySelectorAll('.sentence').forEach(function(el,i){
    el.classList.toggle('active',i===currentIdx);
  });
  var active=document.querySelector('.sentence.active');
  if(active) active.scrollIntoView({behavior:'smooth',block:'center'});
  progressFill.style.width=(sentences.length?(currentIdx+1)/sentences.length*100:0)+'%';
  currentSentenceEl.textContent=(currentIdx+1)+' / '+sentences.length;
  var wpm=parseFloat(speedSlider.value)*150;
  var remaining=0;
  for(var i=currentIdx;i<sentences.length;i++) remaining+=sentences[i].text.split(/\s+/).length;
  var mins=Math.ceil(remaining/wpm);
  timeEstEl.textContent=mins>0?'~'+mins+' min left':'';
}

function speak(idx){
  if(idx>=sentences.length){isPlaying=false;playBtn.innerHTML='&#9654;';return}
  currentIdx=idx;
  currentSection=sentences[idx].section;
  highlightCurrent();
  document.querySelectorAll('.sec-btn').forEach(function(b,i){b.classList.toggle('active',i===currentSection)});

  var utt=new SpeechSynthesisUtterance(sentences[idx].text);
  utt.voice=voices[voiceSelect.value]||null;
  utt.rate=parseFloat(speedSlider.value);
  utt.pitch=parseFloat(pitchSlider.value);
  utt.onend=function(){if(isPlaying) speak(idx+1)};
  utt.onerror=function(){if(isPlaying) speak(idx+1)};
  synth.speak(utt);
}

playBtn.addEventListener('click',function(){
  if(sentences.length===0){parseText();if(sentences.length===0) return}
  if(isPlaying){
    synth.cancel();isPlaying=false;playBtn.innerHTML='&#9654;';
  } else {
    isPlaying=true;playBtn.innerHTML='&#10074;&#10074;';
    speak(currentIdx);
  }
});

stopBtn.addEventListener('click',function(){
  synth.cancel();isPlaying=false;currentIdx=0;
  playBtn.innerHTML='&#9654;';highlightCurrent();
});

document.getElementById('prevSection').addEventListener('click',function(){
  if(currentSection>0) jumpToSection(currentSection-1);
});
document.getElementById('nextSection').addEventListener('click',function(){
  if(currentSection<sections.length-1) jumpToSection(currentSection+1);
});

function jumpToSection(si){
  synth.cancel();
  currentSection=si;
  var idx=sentences.findIndex(function(s){return s.section===si});
  if(idx>=0) currentIdx=idx;
  highlightCurrent();
  renderSections();
  if(isPlaying) speak(currentIdx);
}

document.getElementById('progressBar').addEventListener('click',function(e){
  var rect=this.getBoundingClientRect();
  var pct=Math.max(0,Math.min(1,(e.clientX-rect.left)/rect.width));
  var idx=Math.floor(pct*sentences.length);
  synth.cancel();currentIdx=idx;highlightCurrent();
  if(isPlaying) speak(currentIdx);
});

// Sleep timer
document.querySelectorAll('.sleep-btn').forEach(function(btn){
  btn.addEventListener('click',function(){
    var isActive=btn.classList.contains('active');
    document.querySelectorAll('.sleep-btn').forEach(function(b){b.classList.remove('active')});
    if(sleepTimer){clearInterval(sleepTimer);sleepTimer=null;sleepEnd=null}
    if(isActive){document.getElementById('sleepCountdown').textContent='';return}
    btn.classList.add('active');
    var mins=parseInt(btn.dataset.min);
    sleepEnd=Date.now()+mins*60*1000;
    sleepTimer=setInterval(function(){
      var rem=Math.max(0,sleepEnd-Date.now());
      var m=Math.floor(rem/60000);var s=Math.floor((rem%60000)/1000);
      document.getElementById('sleepCountdown').textContent=m+':'+String(s).padStart(2,'0');
      if(rem<=0){
        clearInterval(sleepTimer);sleepTimer=null;
        synth.cancel();isPlaying=false;playBtn.innerHTML='&#9654;';
        document.querySelectorAll('.sleep-btn').forEach(function(b){b.classList.remove('active')});
        document.getElementById('sleepCountdown').textContent='Stopped';
      }
    },1000);
  });
});

// Bookmark
document.getElementById('bookmarkBtn').addEventListener('click',function(){
  localStorage.setItem('fbook-audio-bm',JSON.stringify({idx:currentIdx,text:textInput.value.substring(0,50)}));
  checkBookmark();
});
function checkBookmark(){
  var bm=localStorage.getItem('fbook-audio-bm');
  var info=document.getElementById('bookmarkInfo');
  if(!bm){info.innerHTML='';return}
  var data=JSON.parse(bm);
  info.innerHTML='Bookmark at sentence '+(data.idx+1)+' <button id="resumeBm">Resume</button>';
  document.getElementById('resumeBm').addEventListener('click',function(){
    currentIdx=Math.min(data.idx,sentences.length-1);
    highlightCurrent();
    if(isPlaying){synth.cancel();speak(currentIdx)}
  });
}
checkBookmark();
})();
</script>
</body>
</html>
